<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BlueLava — Comunidade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#4A90E2;--bg:#0b1f3d;--card:#fff}
    html,body{margin:0;height:100%;font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:#fff}
    .top{background:linear-gradient(180deg,#000f2a,#2b4cb8);padding:12px 16px;text-align:center}
    .top img{max-width:120px}
    .tabs{display:flex;gap:8px;justify-content:center;padding:12px;background:#fff}
    .tab{padding:10px 14px;border-radius:8px;background:transparent;color:#333;text-decoration:none;font-weight:600}
    .tab.active{background:var(--primary);color:#fff}
    .wrap{max-width:980px;margin:14px auto;padding:0 12px}
    .panel{background:var(--card);color:#222;border-radius:10px;padding:8px;min-height:60vh;overflow:hidden}
    iframe{width:100%;height:70vh;border:0;border-radius:8px}
    @media(max-width:700px){.tabs{flex-wrap:wrap;padding:8px}.panel{padding:6px}iframe{height:60vh}}
  </style>
</head>
<body>
  <header class="top">
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap">
      <img src="logo.png" alt="logo">
      <div style="font-weight:700">Comunidade Blue Lava</div>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Portal tabs">
    <a href="#" class="tab" data-tab="historias">Histórias</a>
    <a href="#" class="tab" data-tab="compreender">Compreender</a>
    <a href="#" class="tab" data-tab="recursos">Recursos</a>
    <a href="#" class="tab" data-tab="origem">Origem</a>
  </nav>

  <main class="wrap">
    <div id="panel" class="panel">
      <!-- iframe will be injected here -->
    </div>
  </main>

  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const initial = params.get('tab') || (location.hash ? location.hash.replace('#','') : 'historias');
      const preserveAnon = params.get('anon') === '1';

      const tabs = document.querySelectorAll('.tab');
      const panel = document.getElementById('panel');

      function srcFor(tab){
          const map = {
            'historias': 'index.html',
            'compreender': 'community.html',
            'recursos': 'recursos.html',
            'origem': 'origem.html'
          };
        let src = map[tab] || map['historias'];
        if (preserveAnon) src += (src.includes('?')? '&anon=1' : '?anon=1');
        return src;
      }

      function select(tab){
        tabs.forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
        // inject iframe
        panel.innerHTML = `<iframe src="${srcFor(tab)}" title="${tab}"></iframe>`;
      }

      tabs.forEach(t=>t.addEventListener('click', e=>{ e.preventDefault(); const tab = t.dataset.tab; history.replaceState(null,'',`?tab=${tab}${preserveAnon? '&anon=1':''}`); select(tab); }));

      // initialize
      select(initial);
    })();
  </script>
</body>
</html>
