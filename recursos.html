<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BlueLava - Recursos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#4A90E2}
    body{margin:0;font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:#0b1f3d;color:#fff}
    .top-banner{background:linear-gradient(180deg,#000f2a,#2b4cb8);color:#fff;padding:14px 16px}
    .top-banner-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap}
    .container{max-width:980px;margin:20px auto;padding:0 16px}
    .card{background:#fff;color:#222;padding:16px;border-radius:10px}
    .site-nav{background:#fff;border-bottom:1px solid rgba(0,0,0,.04)}
    .site-nav .nav-link{padding:12px 14px;color:inherit;text-decoration:none;font-family:'Inter',sans-serif;font-weight:500}
    .site-nav .nav-link.active{color:var(--primary);font-weight:700}
    a{color:var(--primary)}
  </style>
</head>
<body>
  <header class="top-banner">
    <div class="top-banner-inner">
      <img src="logo.png" alt="logo" style="max-width:120px;display:block;margin:0">
      <div class="banner-title">Comunidade Blue Lava</div>
    </div>
  </header>

  <nav class="site-nav" aria-label="Main navigation">
    <div class="container" style="display:flex;gap:12px;align-items:center;justify-content:center">
      <a href="portal.html?tab=historias" class="nav-link">Histórias</a>
      <a href="portal.html?tab=compreender" class="nav-link">Compreender</a>
      <a href="portal.html?tab=recursos" class="nav-link active">Recursos</a>
      <a href="portal.html?tab=origem" class="nav-link">Origem</a>
    </div>
  </nav>

  <main class="container">
    <h1 style="color:#fff">Recursos</h1>
    <div class="card" style="margin-top:12px">
      <p style="margin:0">Aqui irei adicionar PDFs, guias simples e estudos adaptados numa linguagem acessível. Quando estiveres pronto, envia-me os PDFs e eu adapto o conteúdo para o público geral.</p>
    </div>
  </main>

  <script>
    (function(){
      const params = new URLSearchParams(window.location.search); if (params.get('anon')==='1'){
        document.querySelectorAll('a').forEach(a=>{ const href=a.getAttribute('href'); if(!href) return; if (href.startsWith('http')||href.startsWith('#')) return; a.href = href + (href.includes('?')? '&anon=1' : '?anon=1'); });
      }
    })();
  </script>
</body>
</html>
